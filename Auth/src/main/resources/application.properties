spring.application.name=Auth
spring.config.import=optional:file:.env[.properties]

# DB Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/AIWorkBench_Auth}
spring.datasource.username=${DB_USERNAME:AIWorkBench_User}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate — Flyway owns schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${DB_SCHEMA:AIWorkBench_Auth}
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
