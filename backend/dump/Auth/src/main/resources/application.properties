spring.application.name=Auth
spring.config.import=optional:file:.env[.properties]

# DB Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/AIWorkBench_Auth}
spring.datasource.username=${DB_USERNAME:AIWorkBench_User}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate — Flyway owns schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration-mysql
spring.flyway.default-schema=${DB_SCHEMA:AIWorkBench_Auth}
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/auth/v3/api-docs

# JWT
jwt.secret=${JWT_SECRET:ChangeMeToA32CharMinimumSecretKeyForJwtSigning123!}
jwt.issuer=${JWT_ISSUER:AuthService}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# Email (SMTP)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_USE_TLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_USE_TLS:true}
spring.mail.properties.mail.debug=${SPRING_MAIL_PROPERTIES_MAIL_DEBUG:false}
mail.from=${SMTP_FROM:no-reply@example.com}

# Email OTP
otp.length=${OTP_LENGTH:6}
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
otp.max-send-per-hour=${OTP_MAX_SEND_PER_HOUR:3}
otp.max-verify-attempts=${OTP_MAX_VERIFY_ATTEMPTS:5}
otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}

# Rate limiting (per IP + method + path)
rate.limit.requests=${RATE_LIMIT_REQUESTS:60}
rate.limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000



logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
