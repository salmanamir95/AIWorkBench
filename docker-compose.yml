services:
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: AIWorkBench_Auth
      MYSQL_USER: AIWorkBench_User
      MYSQL_PASSWORD: Password123
      MYSQL_ROOT_PASSWORD: binblast122
    ports:
      - "3307:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--log-bin-trust-function-creators=1"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: ./Auth
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./Auth/.env
    environment:
      DB_URL: jdbc:mysql://auth-db:3306/AIWorkBench_Auth
      DB_USERNAME: AIWorkBench_User
      DB_PASSWORD: Password123
      DB_SCHEMA: AIWorkBench_Auth
      SPRING_MAIL_PROPERTIES_MAIL_DEBUG: "false"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "0"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
      SPRING_FLYWAY_CONNECT_RETRIES: "60"
    depends_on:
      auth-db:
        condition: service_healthy

  gateway-service:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - auth-service

volumes:
  auth-db-data:
